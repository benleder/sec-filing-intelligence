# benchmark.skeleton.yaml — 25 entry stubs per DESIGN §6.1, counts per
# ARCHITECTURE §6 (direct_lookup 8, derived 6, quarterly_yoy 3,
# period_trap 3, label_trap 2, scale_trap 1, should_refuse 2).
#
# PROVENANCE (rule 9): entries marked # SUGGESTED carry AI-proposed QUESTION
# WORDING ONLY. Every ground-truth field is a FILL_ME blank and ALL values
# are human-recorded by Ben from the PDFs — nothing here was derived from,
# or checked against, the parser or the fact store, so the ground truth
# stays uncorrelated with the system under test.
#
# How to fill:
#   behavior       -> answer | refuse | candidates | conflict
#   value          -> exact normalized decimal string (sign + scale applied,
#                     e.g. "416161000000", "1.18", "-1204000000"); null for
#                     non-answer behaviors
#   unit           -> USD | USD_PER_SHARE | ratio | pp
#   concept        -> concepts.yaml id (or derived metric name)
#   period         -> typed {fiscal_year, fiscal_period}; two-period entries
#                     record the NEWER period here, the pair in notes
#   citation.page  -> 1-based PDF page where YOU verified the number
#   citation.raw_label        -> the label as printed (label_as_printed)
#   citation.value_as_printed -> the cell as printed, e.g. "(1,204)" —
#                     human-verification aid beyond the §6.1 template; the
#                     scorer scores expect.value, this field is for eyeballs
#   refusal_kind   -> RefusalKind name for behavior: refuse, else null
#
# Rename to benchmark.yaml when filled. Replace or reword any SUGGESTED
# question freely — the wording is a proposal, not a constraint.

